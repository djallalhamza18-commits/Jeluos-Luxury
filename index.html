<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jilous Luxury</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.loader { border: 4px solid #f3f3f3; border-top: 4px solid #dc2626; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-gray-50 text-right">

<header class="bg-black text-white shadow-lg sticky top-0 z-50 border-b-4 border-red-600">
<div class="container mx-auto px-4 py-4 flex justify-between items-center">
<h1 class="text-2xl font-black italic tracking-widest">JILOUS LUXURY</h1>
<div id="loadingStatus" class="loader"></div>
</div>
<div class="flex overflow-x-auto py-3 px-4 gap-3 text-sm font-bold no-scrollbar bg-black text-white">
<a href="#section-ملابس" class="whitespace-nowrap bg-red-600 px-4 py-1 rounded-full">ملابس</a>
<a href="#section-احذية" class="whitespace-nowrap hover:bg-red-900 px-4 py-1 rounded-full border border-red-600">أحذية</a>
<a href="#section-اكسسوار" class="whitespace-nowrap hover:bg-red-900 px-4 py-1 rounded-full border border-red-600">اكسسوار</a>
<a href="#section-اخرى" class="whitespace-nowrap hover:bg-red-900 px-4 py-1 rounded-full border border-red-600">أخرى</a>
</div>
</header>

<main class="container mx-auto px-4 py-6">
<section id="section-ملابس" class="mb-10"><h2 class="text-xl font-black mb-4 pr-2 border-r-4 border-red-600">👕 ملابس</h2><div id="grid-ملابس" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></section>
<section id="section-احذية" class="mb-10"><h2 class="text-xl font-black mb-4 pr-2 border-r-4 border-black">👟 أحذية</h2><div id="grid-احذية" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></section>
<section id="section-اكسسوار" class="mb-10"><h2 class="text-xl font-black mb-4 pr-2 border-r-4 border-red-600">⌚ اكسسوار</h2><div id="grid-اكسسوار" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></section>
<section id="section-اخرى" class="mb-10"><h2 class="text-xl font-black mb-4 pr-2 border-r-4 border-black">📦 أخرى</h2><div id="grid-اخرى" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></section>
</main>

<a href="https://wa.me/213774218406" target="_blank" class="fixed bottom-6 left-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-50 animate-bounce">
<svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.23 0-5.857 2.627-5.857 5.857 0 1.05.276 2.072.802 2.973l-1.047 3.824 3.91-1.026c.86.47 1.832.718 2.82.718h.001c3.23 0 5.857-2.627 5.857-5.857 0-3.23-2.627-5.857-5.857-5.857zm.001 10.702c-.88 0-1.745-.236-2.502-.682l-.18-.106-1.865.489.497-1.815-.117-.189c-.49-.791-.748-1.693-.748-2.614 0-2.682 2.181-4.864 4.864-4.864 2.682 0 4.864 2.181 4.864 4.864 0 2.682-2.182 4.864-4.863 4.864z"/></svg>
</a>

<div id="previewModal" class="fixed inset-0 bg-black/95 hidden flex flex-col items-center justify-center p-4 z-[100]">
<button onclick="closePreview()" class="absolute top-6 left-6 text-white text-3xl">✕</button>
<div class="max-w-md w-full text-center text-white">
<img id="previewImg" src="" class="w-full rounded-2xl mb-4 h-96 object-cover border-2 border-white/20">
<h3 id="previewTitle" class="text-2xl font-bold mb-1"></h3>
<p id="previewPrice" class="text-xl text-red-500 font-black mb-6"></p>
<button id="orderBtnNow" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">إضغط هنا لطلب المنتج 🚚</button>
</div>
</div>

<div id="orderModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[110]">
<div class="bg-white p-6 rounded-3xl w-full max-w-sm">
<h3 id="finalTitle" class="text-xl font-bold mb-6 text-center text-black">تأكيد الطلب</h3>
<form id="orderForm" class="space-y-4">
<input type="hidden" id="productInput">
<input type="text" id="custName" placeholder="الإسم الكامل" required class="w-full p-4 bg-gray-100 rounded-xl outline-none">
<input type="tel" id="custPhone" placeholder="رقم الهاتف" required class="w-full p-4 bg-gray-100 rounded-xl outline-none text-left">
<input type="text" id="custCity" placeholder="الولاية والبلدية" required class="w-full p-4 bg-gray-100 rounded-xl outline-none">
<button type="submit" id="submitBtn" class="w-full bg-black text-white py-4 rounded-2xl font-black text-lg shadow-xl">تأكيد الشراء ✅</button>
<button type="button" onclick="closeOrder()" class="w-full text-gray-400 text-sm py-2">رجوع</button>
</form>
</div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvXtwiA2f_zrqbGU_tn4Yu1dmTWHG01RuaW80BQdHAGvm13Z8GcKGkBhYVn5WdAs9GzgrDwSNQPvWy/pub?output=csv";

async function fetchProducts() {
try {
const response = await fetch(url);
const data = await response.text();
const rows = data.split('\n').slice(1);
rows.forEach(row => {
const columns = row.split(',').map(col => col.replace(/^"(.*)" 1').trim());
if (columns.length >= 4) {
displayProduct({ name: columns[0], price: columns[1], img: columns[2], category: columns[3] });
}
});
document.getElementById('loadingStatus').style.display = 'none';
} catch (error) { console.error(error); }
}

function displayProduct(item) {
const grid = document.getElementById(grid-${item.category}); if (grid) { grid.innerHTML +=
<div class="bg-white rounded-xl overflow-hidden shadow-sm border p-2 cursor-pointer transition active:scale-95"
onclick="viewProduct('${item.name}', '${item.img}', '${item.price}')"&gt; &lt;img src="${item.img}" class="w-full h-40 object-cover rounded-lg mb-2">
<h3 class="font-bold text-[11px] truncate">${item.name}&lt;/h3&gt; &lt;p class="text-red-600 font-black text-xs"&gt;${item.price} دج</p>
</div>
`;
}
}

function viewProduct(name, img, price) {
document.getElementById('previewImg').src = img;
document.getElementById('previewTitle').innerText = name;
document.getElementById('previewPrice').innerText = price + " دج";
document.getElementById('previewModal').classList.remove('hidden');
document.getElementById('orderBtnNow').onclick = () => openOrderForm(name);
}

function closePreview() { document.getElementById('previewModal').classList.add('hidden'); }
function openOrderForm(name) {
document.getElementById('productInput').value = name;
document.getElementById('finalTitle').innerText = "طلب: " + name;
document.getElementById('orderModal').classList.remove('hidden');
closePreview();
}
function closeOrder() { document.getElementById('orderModal').classList.add('hidden'); }

const token = "8584625566:AAGqlrrdwdqKuprpG5VBShs9nOxguKaxSoI";
const chatId = "2091819395";

document.getElementById('orderForm').addEventListener('submit', async (e) => {
e.preventDefault();
const btn = document.getElementById('submitBtn');
btn.innerText = "جاري الإرسال...";
const msg = 🛍️ طلب جديد من Jilous Luxury:\n\n🏷️ المنتج:${document.getElementById('productInput').value}\n👤 الاسم: latex
{document.getElementById('custName').value}\n📞 الهاتف: 

{document.getElementById('custPhone').value}\n📍 العنوان:  {token}/sendMessage`, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({chat_id: chatId, text: msg})
});
alert("تم الطلب بنجاح!");
closeOrder();
btn.innerText = "تأكيد الشراء ✅";
});

fetchProducts();
</script>
</body>
</html>
